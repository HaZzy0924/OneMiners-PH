<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OneMiners PH Recruitment</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      min-height: 100vh;
      background: #0f172a;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    }

    .title {
      color: white;
      font-size: clamp(14px, 2vw, 20px);
      font-weight: bold;
    }

    .logo {
      height: 40px;
      width: auto;
      border-radius: 6px;
    }

    .container {
      width: 100%;
      height: 100vh;
    }

    .embed {
      position: relative;
      width: 100%;
      height: 100%;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    @media (max-width: 768px) {
      .logo {
        height: 30px;
      }

      .title {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="title">OneMiners PH Recruitment</div>
    <img class="logo" src="https://oneminers.com/cdn/shop/files/oneminers-launch-roadmap.jpg?v=1736338248" alt="OneMiners Logo">
  </div>

  <div class="container">
    <div class="embed">
      <iframe
        loading="lazy"
        src="https://www.canva.com/design/DAHEYdyLsDM/0VStKASjIK54Ge6YYTKbWA/view?embed"
        allowfullscreen="allowfullscreen"
        allow="fullscreen">
      </iframe>
    </div>
  </div>

</body>
</html>
