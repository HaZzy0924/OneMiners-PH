<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canva Embed</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      min-height: 100vh;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      height: 100vh;
      max-width: 1200px;
      padding: 10px;
    }

    .embed {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Mobile optimization */
    @media (max-width: 768px) {
      .container {
        padding: 0;
        height: 100vh;
      }

      .embed {
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="embed">
      <iframe
        loading="lazy"
        src="https://www.canva.com/design/DAHEYdyLsDM/0VStKASjIK54Ge6YYTKbWA/view?embed"
        allowfullscreen="allowfullscreen"
        allow="fullscreen">
      </iframe>
    </div>
  </div>
</body>
</html>
